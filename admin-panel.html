<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZABU – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* (UNCHANGED CSS — SAME AS YOUR ORIGINAL) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ff2d2d;--red2:#cc1a1a;
  --bg:#060608;--s1:#0e0e12;--s2:#16161c;--s3:#1e1e26;
  --border:#ffffff0a;--border2:#ffffff14;
  --text:#f2f2f5;--muted:#6b6b7a;--muted2:#9898a8;
  --green:#22c55e;--orange:#f97316;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
/* rest of CSS unchanged... */
</style>
</head>
<body>

<nav>
  <div class="nav-logo">ZABU</div>
  <div class="nav-r">
    <span class="nav-tag">Admin Panel</span>
    <a class="btn-xs" href="index.html" target="_blank">View Site ↗</a>
    <button class="btn-xs" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-n o" id="sP">–</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n g" id="sA">–</div><div class="stat-l">Approved</div></div>
    <div class="stat"><div class="stat-n" id="sR">–</div><div class="stat-l">Rejected</div></div>
    <div class="stat"><div class="stat-n" id="sT">–</div><div class="stat-l">Total Payments</div></div>
    <div class="stat"><div class="stat-n g" id="sV">–</div><div class="stat-l">Videos</div></div>
  </div>

  <div class="section">
    <div class="sec-head">
      <div class="sec-title">💰 PAYMENTS</div>
      <button class="refresh-btn" onclick="loadPayments()">🔄 Refresh</button>
    </div>
    <div id="payList"></div>
  </div>
</main>

<script>
const ADMIN_SECRET="zabu-admin-secret-2024";
if(localStorage.getItem("zabu_admin")!=="true")location.href="admin.html";

function logout(){localStorage.removeItem("zabu_admin");location.href="admin.html"}

function timeAgo(d){
  const m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<1)return"just now";if(m<60)return m+"m ago";
  const h=Math.floor(m/60);if(h<24)return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

/* ── PAYMENTS ── */
async function loadPayments(){
  const list=document.getElementById("payList");
  try{
    const r=await fetch("/payments",{headers:{"x-admin-secret":ADMIN_SECRET}});
    const d=await r.json();
    const payments=d.payments||[];

    document.getElementById("sP").innerText=payments.filter(p=>p.status==="pending").length;
    document.getElementById("sA").innerText=payments.filter(p=>p.status==="approved").length;
    document.getElementById("sR").innerText=payments.filter(p=>p.status==="rejected").length;
    document.getElementById("sT").innerText=payments.length;

    if(!payments.length){
      list.innerHTML='<div class="empty">No payments yet</div>';
      return;
    }

    list.innerHTML=payments.map(p=>`
      <div class="pcard">
        <div class="pinfo">
          <div class="p-phone">📱 ${p.phone||"—"}</div>
          <div class="p-ref">Ref: ${p.tx_ref||"—"}</div>
          <div class="p-time">${timeAgo(p.createdAt)}</div>
        </div>
        <div class="pactions">
          ${p.status==="pending"?`
            <button class="btn-ap" onclick="approve('${p._id}')">✅ Approve</button>
            <button class="btn-rj" onclick="reject('${p._id}')">Reject</button>
          `:""}

          ${p.status==="approved"?`
            <span class="badge b-a">✅ Approved</span>
            ${p.code?`<span class="code-tag">${p.code}</span>`:""}
          `:""}

          ${p.status==="rejected"?`
            <span class="badge b-r">Rejected</span>
          `:""}
        </div>
      </div>
    `).join("");

  }catch{
    list.innerHTML='<div class="empty" style="color:var(--red)">Could not load payments</div>';
  }
}

async function approve(id){
  const r=await fetch("/approve-payment/"+id,{
    method:"POST",
    headers:{"x-admin-secret":ADMIN_SECRET}
  });
  const d=await r.json();
  if(d.ok&&d.code){
    alert("✅ Approved!\n\nAccess Code: "+d.code);
  }
  loadPayments();
}

async function reject(id){
  if(!confirm("Reject this payment?"))return;
  await fetch("/reject-payment/"+id,{
    method:"POST",
    headers:{"x-admin-secret":ADMIN_SECRET}
  });
  loadPayments();
}

/* INIT */
loadPayments();
setInterval(loadPayments,30000);
</script>

</body>
</html>
