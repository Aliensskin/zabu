<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZABU – Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#ff2d2d;--red2:#cc1a1a;
  --bg:#060608;--s1:#0e0e12;--s2:#16161c;--s3:#1e1e26;
  --border:#ffffff0a;--border2:#ffffff14;
  --text:#f2f2f5;--muted:#6b6b7a;--muted2:#9898a8;
  --green:#22c55e;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* NAV */
nav{
  background:var(--s1);border-bottom:1px solid var(--border2);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:900;letter-spacing:5px;
  color:var(--red);text-shadow:0 0 20px #ff2d2d40;
}
.nav-r{display:flex;align-items:center;gap:12px}
.timer{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:30px;padding:5px 14px;
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.timer b{color:var(--green);font-weight:600}
.timer.warn b{color:#f97316}
.timer.crit b{color:var(--red)}
.btn-out{
  background:transparent;border:1px solid var(--border2);
  border-radius:8px;color:var(--muted);
  padding:7px 14px;font-size:13px;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;
}
.btn-out:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:32px 20px}
.section-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--border2);
}
.section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:700;letter-spacing:2px;color:var(--muted2);
}
.vid-count{font-size:13px;color:var(--muted)}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));
  gap:20px;
}
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  cursor:pointer;
}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 16px 40px #0000008c}
.video-wrap{background:#000;aspect-ratio:16/9;position:relative;overflow:hidden}
.video-wrap video{width:100%;height:100%;object-fit:contain;display:block}
.card-body{padding:14px}
.vid-name{
  font-size:13px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:12px;
}
.card-actions{display:flex;gap:8px}
.btn-dl{
  flex:1;padding:9px 14px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);
  border-radius:8px;color:var(--green);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  text-decoration:none;text-align:center;
  transition:background .2s;
}
.btn-dl:hover{background:rgba(34,197,94,.2)}

/* SKELETON */
.skel{
  background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
  border-radius:14px;aspect-ratio:16/9;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMPTY */
.empty{
  text-align:center;padding:80px 20px;color:var(--muted);
  grid-column:1/-1;
}
.empty svg{margin-bottom:16px;opacity:.3}
.empty p{font-size:15px}

/* EXPIRED OVERLAY */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.95);z-index:999;
  align-items:center;justify-content:center;padding:24px;
}
.overlay.show{display:flex}
.ovl-box{
  background:var(--s1);border:1px solid #333;
  border-radius:20px;padding:clamp(32px,6vw,52px);
  text-align:center;max-width:400px;width:100%;
  animation:fadeUp .4s ease;
}
.ovl-icon{font-size:52px;margin-bottom:16px}
.ovl-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;font-weight:700;letter-spacing:2px;
  color:var(--red);margin-bottom:10px;
}
.ovl-sub{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px}
.btn-pay{
  display:block;padding:16px;background:var(--red);
  border-radius:10px;color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:700;letter-spacing:2px;
  text-decoration:none;transition:background .2s;
  box-shadow:0 4px 20px #ff2d2d40;
}
.btn-pay:hover{background:var(--red2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* MOBILE */
@media(max-width:520px){
  nav{padding:0 16px}
  .nav-logo{font-size:22px;letter-spacing:4px}
  .timer{display:none}
  .timer.warn,.timer.crit{display:flex}
  main{padding:20px 14px}
  .grid{gap:14px}
}
</style>
</head>
<body>

<div class="overlay" id="expiredOverlay">
  <div class="ovl-box">
    <div class="ovl-icon">⏰</div>
    <div class="ovl-title">ACCESS EXPIRED</div>
    <div class="ovl-sub">Your 24-hour access has ended.<br>Pay again to continue watching.</div>
    <a class="btn-pay" href="payment.html">💳 PAY 500 UGX – RENEW</a>
  </div>
</div>

<nav>
  <div class="nav-logo">ZABU</div>
  <div class="nav-r">
    <div class="timer" id="timer" style="display:none">⏳ <b id="timerTxt">–</b></div>
    <button class="btn-out" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <div class="section-bar">
    <div class="section-title">📺 VIDEOS</div>
    <div class="vid-count" id="vidCount"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<script>
const token=localStorage.getItem("zabu_token");
if(!token)location.href="gate.html";

function logout(){localStorage.removeItem("zabu_token");location.href="gate.html"}

// Session check
async function checkSession(){
  try{
    const r=await fetch("/session-status",{headers:{"Authorization":token}});
    const d=await r.json();
    const el=document.getElementById("timer");
    const tx=document.getElementById("timerTxt");
    if(!d.valid){
      localStorage.removeItem("zabu_token");
      document.getElementById("expiredOverlay").classList.add("show");
      return;
    }
    const h=d.hoursLeft,m=d.minutesLeft;
    tx.innerText=h+"h "+m+"m left";
    el.className=h<1?"timer crit":h<3?"timer warn":"timer";
    el.style.display="flex";
  }catch(e){console.warn("Session check failed",e)}
}
checkSession();
setInterval(checkSession,60000);

// Load videos
async function loadVideos(){
  const grid=document.getElementById("grid");
  grid.innerHTML=Array(6).fill('<div class="skel"></div>').join("");
  try{
    const r=await fetch("/videos-list",{headers:{"Authorization":token}});
    const d=await r.json();
    grid.innerHTML="";
    const videos=d.videos||[];
    document.getElementById("vidCount").innerText=
      videos.length?videos.length+" video"+(videos.length!==1?"s":""):"";
    if(!videos.length){
      grid.innerHTML=`<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="3"/>
          <polygon points="10,8 16,12 10,16"/>
        </svg>
        <p>No videos yet — check back soon!</p>
      </div>`;
      return;
    }
    videos.forEach(v=>{
      const name = v.filename || "Video";
      const url  = v.url;
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <div class="video-wrap">
          <video controls preload="metadata" playsinline>
            <source src="${url}" type="video/mp4">
          </video>
        </div>
        <div class="card-body">
          <div class="vid-name" title="${name}">${name}</div>
          <div class="card-actions">
            <a class="btn-dl" href="${url}" download="${name}" target="_blank">⬇ Download</a>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }catch(e){
    grid.innerHTML='<div class="empty"><p style="color:#ff2d2d">Failed to load videos. Is the server running?</p></div>';
  }
}
loadVideos();
</script>
</body>
</html>
